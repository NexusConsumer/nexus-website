<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Nexus - Financial Infrastructure</title>

    <!-- Open Graph / Social Sharing (static defaults — overridden per-page by useSEO hook) -->
    <meta property="og:title" content="Nexus — Financial Infrastructure for Modern Business" />
    <meta property="og:description" content="Payment processing, card issuance, loyalty programs, and corporate benefits for businesses in 135+ currencies." />
    <meta property="og:image" content="https://nexus-payment.com/og-image.png" />
    <meta property="og:url" content="https://nexus-payment.com/" />
    <meta property="og:type" content="website" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Nexus — Financial Infrastructure for Modern Business" />
    <meta name="twitter:description" content="Payment processing, card issuance, loyalty programs, and corporate benefits for businesses." />
    <meta name="twitter:image" content="https://nexus-payment.com/og-image.png" />

    <!-- Preload critical LCP image (English home — most common entry) -->
    <link rel="preload" as="image" href="/hero-mockup-en.webp" type="image/webp" fetchpriority="high" />

    <!-- Preconnect to font origin before stylesheet fetch -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!-- Inter only for initial load — covers 95%+ of non-Hebrew traffic.
         Rubik (Hebrew) is loaded lazily by HomeHe/LoginHe/SignupHe pages.
         Reduced weight set: 400/500/600/700 (dropped 800 — rarely used) -->
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <!-- Prefetch CDN origins (improves API TTFB) -->
    <link rel="dns-prefetch" href="https://fonts.gstatic.com" />

    <!-- topojson: loaded async so it never blocks rendering.
         The globe component waits for window.topojson to be available. -->
    <script
      async
      src="https://cdn.jsdelivr.net/npm/topojson-client@3"
      crossorigin="anonymous"
    ></script>

    <!-- Prevent dark flash before CSS loads -->
    <style>html, body, #root { background: #ffffff; }</style>

    <!-- Google Analytics (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-WD659PKX9Q"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-WD659PKX9Q');
    </script>

    <!-- Apollo website visitor tracking -->
    <script>function initApollo(){var n=Math.random().toString(36).substring(7),o=document.createElement("script");
    o.src="https://assets.apollo.io/micro/website-tracker/tracker.iife.js?nocache="+n,o.async=!0,o.defer=!0,
    o.onload=function(){window.trackingFunctions.onLoad({appId:"6937fb01229aa8001580c3f4"})},
    document.head.appendChild(o)}initApollo();</script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
