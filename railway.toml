[build]
builder = "NIXPACKS"
buildCommand = "npm install && rm -rf dist backend/public node_modules/.vite && npx vite build && cd backend && npm install && npx prisma generate && npm run build"

[deploy]
startCommand = "cd backend && npx prisma migrate deploy && node dist/index.js"
healthcheckPath = "/api/health"
healthcheckTimeout = 60
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
